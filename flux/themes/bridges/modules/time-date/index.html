<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX // CHRONOMETRY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-hud-primary: #00BFFF;
            --color-hud-primary-soft: #4FC3F7;
            --color-hud-neutral: #E8EAED;
            --color-hud-safe: #39FF14;
            --color-hud-caution: #FFC107;
            --color-hud-danger: #FF2020;
            --color-bg-base: rgba(10, 15, 26, 0.90);
            --color-bg-panel: rgba(0, 191, 255, 0.10);
            --color-bg-panel-hover: rgba(0, 191, 255, 0.18);
            --color-border-default: rgba(79, 195, 247, 0.45);
            --font-main: 'Rajdhani', sans-serif;
            --font-tech: 'Share Tech Mono', monospace;
            --font-header: 'Orbitron', sans-serif;
            --mouse-x: 50%; --mouse-y: 50%;
            --pattern-opacity: 0;
        }

        html { font-size: 14px; height: 100%; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background: transparent;
            color: var(--color-hud-primary);
            font-family: var(--font-main);
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            padding: 4px;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; opacity: 0.15;
        }

        .hud-container {
            width: 100%; height: 100%;
            background: var(--color-bg-base);
            border: 1px solid var(--color-border-default);
            position: relative;
            backdrop-filter: blur(25px);
            clip-path: polygon(0 0, 96% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.15);
        }

        .pattern-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            opacity: var(--pattern-opacity); transition: opacity 0.4s ease;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0l20 20-20 20L0 20z' fill='none' stroke='%2300BFFF' stroke-width='0.5' stroke-opacity='0.4'/%3E%3C/svg%3E");
            background-size: 30px 30px;
            mask-image: radial-gradient(circle 140px at var(--mouse-x) var(--mouse-y), black 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
        }

        .content { 
            position: relative; z-index: 5; 
            display: flex; flex-direction: column; 
            height: 100%; 
            padding: 0.8rem 1.2rem; 
            gap: 0.4rem;
        }

        header { 
            border-bottom: 1px solid var(--color-border-default); 
            padding-bottom: 0.2rem; display: flex; justify-content: space-between; align-items: flex-end; 
            flex-shrink: 0; pointer-events: auto;
        }
        
        h1 { 
            font-family: var(--font-header); font-size: 0.9rem; letter-spacing: 2px; 
            color: var(--color-hud-neutral); text-shadow: 0 0 8px var(--color-hud-primary); 
            white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        h1:hover { color: #fff; text-shadow: 0 0 15px var(--color-hud-primary); }

        .header-meta { font-family: var(--font-tech); font-size: 0.75rem; color: var(--color-hud-primary-soft); opacity: 0.8; }

        /* Main Time Display */
        .time-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .time-main {
            font-family: var(--font-tech);
            font-size: 4rem;
            color: var(--color-hud-neutral);
            line-height: 1;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
        }

        .time-seconds {
            font-size: 1.5rem;
            color: var(--color-hud-primary-soft);
            opacity: 0.7;
            width: 2rem;
        }

        .date-main {
            font-family: var(--font-header);
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--color-hud-primary);
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        .day-progress {
            width: 100%;
            height: 2px;
            background: var(--color-bg-panel);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--color-hud-primary);
            width: 0%;
            box-shadow: 0 0 8px var(--color-hud-primary);
            transition: width 1s linear;
        }

        .weather-footer { 
            border-top: 1px solid var(--color-border-default); 
            padding-top: 0.4rem; 
            display: flex; justify-content: space-between; align-items: center; 
            font-family: var(--font-tech); font-size: 0.75rem; color: var(--color-hud-primary-soft); 
            opacity: 0.8;
            pointer-events: auto;
        }
        
        .tz-tag { color: var(--color-hud-primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .resizer { position: absolute; background: transparent; z-index: 1000; pointer-events: auto; }
        .resizer-r { top: 0; right: 0; width: 10px; height: 100%; cursor: e-resize; }
        .resizer-b { bottom: 0; left: 0; width: 10px; height: 10px; cursor: s-resize; }
        .resizer-rb { bottom: 0; right: 0; width: 20px; height: 20px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--color-hud-primary) 50%); }

        @keyframes flicker {
            0% { opacity: 0.8; } 5% { opacity: 1; } 10% { opacity: 0.8; } 100% { opacity: 1; }
        }
        .flicker-on-mount { animation: flicker 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="hud-container flicker-on-mount" id="main-container">
        <div class="pattern-layer" id="spotlight"></div>
        <div class="resizer resizer-r" data-direction="East"></div>
        <div class="resizer resizer-b" data-direction="South"></div>
        <div class="resizer resizer-rb" data-direction="SouthEast"></div>

        <div class="content">
            <header>
                <h1 id="open-settings">FLUX // CHRONOMETRY</h1>
                <div class="header-meta" id="utc-time">UTC // 00:00:00</div>
            </header>

            <div class="time-display">
                <div class="time-main">
                    <span id="clock-main">00:00</span>
                    <span class="time-seconds" id="clock-seconds">00</span>
                </div>
                <div class="date-main" id="date-main">MON // MARCH 23 2026</div>
                
                <div class="day-progress" title="Solar Cycle Progress">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="weather-footer">
                <div class="tz-tag" id="timezone-label">COLORADO // MST</div>
                <div id="mission-timer">MISSION // 00:00:00</div>
            </div>
        </div>
    </div>
    <script src="flux-module://_flux/widget-api.js"></script>
    <script type="module" src="logic.js"></script>
</body>
</html>
