<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOJI PRO // WEATHER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-hud.css">
  <style>
    /* --- Widget Container (shared Flux pattern) --- */
    .widget-container {
      position: relative; width: 100%; height: 100%;
      padding: 1.2rem 1.4rem;
      display: flex; flex-direction: column; gap: 1rem;
      touch-action: none; font-family: var(--font-main); color: var(--color-hud-neutral); overflow: hidden;
    }
    .background-layers {
      position: absolute; inset: -40px;
      -webkit-mask-image: radial-gradient(ellipse closest-side at center, black 20%, transparent 90%);
      mask-image: radial-gradient(ellipse closest-side at center, black 20%, transparent 90%);
      pointer-events: none; z-index: 0;
    }
    .widget-background {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse closest-side at center, rgba(10,15,26,0.55) 20%, transparent 90%);
      backdrop-filter: blur(25px);
    }
    .scanlines {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.08) 50%);
      background-size: 100% 4px; pointer-events: none; z-index: 1;
    }
    .resizer { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; z-index: 50; }

    /* --- Weather-specific styles --- */
    .content { position: relative; z-index: 10; display: flex; flex-direction: column; gap: 1rem; height: 100%; }

    /* Staggered entry animation */
    @keyframes section-enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .content > *:nth-child(1) { animation: section-enter 0.4s ease both; }
    .content > *:nth-child(2) { animation: section-enter 0.4s 60ms ease both; }
    .content > *:nth-child(3) { animation: section-enter 0.4s 120ms ease both; }
    .content > *:nth-child(4) { animation: section-enter 0.4s 180ms ease both; }
    .content > *:nth-child(5) { animation: section-enter 0.4s 240ms ease both; }

    header {
      position: relative;
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid rgba(0,191,255,0.18); padding-bottom: 0.4rem;
      box-shadow: 0 1px 0 rgba(0,191,255,0.06);
      flex-shrink: 0;
    }
    header::before {
      content: "";
      position: absolute;
      left: -1rem;
      top: 0;
      bottom: 0.4rem;
      width: 2px;
      background: var(--color-hud-primary);
      box-shadow: 0 0 6px var(--color-hud-primary);
      opacity: 0.8;
    }
    header h1 {
      font-family: var(--font-header); font-size: 0.8rem; letter-spacing: 2px;
      color: var(--color-hud-neutral); opacity: 0.7; text-transform: uppercase; cursor: pointer;
    }
    header h1:hover { opacity: 1; text-shadow: 0 0 10px var(--color-hud-primary); }
    .header-right { display: flex; align-items: center; gap: 0.8rem; }

    /* Temperature hero */
    .temp-display { text-align: center; position: relative; flex-shrink: 0; }
    .temp-value {
      font-family: var(--font-header); font-weight: 900; font-size: 6rem; line-height: 1;
      color: var(--current-glow, var(--color-hud-primary));
      text-shadow: 0 0 30px var(--color-hud-primary), 0 0 60px rgba(0,191,255,0.3);
      transition: color 1s ease, text-shadow 1s ease;
    }
    .temp-unit { font-family: var(--font-tech); font-size: 1.5rem; vertical-align: super; opacity: 0.7; }
    .weather-condition {
      font-family: var(--font-tech); font-size: 0.85rem; letter-spacing: 2px;
      color: var(--color-hud-primary-soft); margin-top: 0.2rem; text-transform: uppercase;
    }
    .location-display {
      font-family: var(--font-tech); font-size: 0.75rem; color: var(--color-hud-primary-soft);
      opacity: 0.45; letter-spacing: 1px; text-transform: uppercase;
    }
    .feels-like { font-family: var(--font-tech); font-size: 0.75rem; color: var(--color-hud-primary-soft); opacity: 0.45; }

    /* Hourly forecast */
    .hourly-section { flex-shrink: 0; }
    .section-label {
      font-family: var(--font-tech); font-size: 0.65rem; letter-spacing: 2px;
      color: var(--color-hud-primary); opacity: 0.7; text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .hourly-grid { display: flex; gap: 0.5rem; overflow: hidden; }
    .hourly-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      background: rgba(0,191,255,0.05); border: 1px solid rgba(0,191,255,0.1);
      border-radius: 4px; padding: 0.4rem 0.3rem; font-family: var(--font-tech); font-size: 0.7rem;
    }
    .hourly-temp { color: var(--color-hud-neutral); }
    .hourly-time { color: var(--color-hud-primary-soft); opacity: 0.45; font-size: 0.65rem; }
    .hourly-icon { display: flex; align-items: center; justify-content: center; }

    /* Hourly icon size */
    .wx-icon { width: 20px; height: 20px; }

    /* Scan bar graph */
    .scan-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .scan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .scan-tabs { display: flex; gap: 0.4rem; }
    .scan-tab {
      font-family: var(--font-tech); font-size: 0.6rem; padding: 0.15rem 0.4rem;
      border: 1px solid rgba(0,191,255,0.2); color: var(--color-hud-primary-soft);
      opacity: 0.5; cursor: pointer; border-radius: 2px; background: transparent;
    }
    .scan-tab.active { opacity: 1; border-color: var(--color-hud-primary); color: var(--color-hud-neutral); }
    .scan-bars-container { flex: 1; display: flex; align-items: flex-end; gap: 1px; min-height: 60px; overflow: hidden; }
    .scan-bar {
      flex: 1;
      background-image: radial-gradient(circle, var(--bar-color, var(--color-hud-primary)) 1.7px, transparent 1.7px);
      background-size: 4px 4px;
      background-position: 0% 100%;
      background-repeat: repeat;
      opacity: 0.75;
      transition: height 0.5s ease;
      min-height: 2px;
    }
    .scan-bar.current { opacity: 1; filter: drop-shadow(0 0 3px var(--color-hud-primary)); }
    .scan-day-labels { display: flex; justify-content: space-between; margin-top: 0.3rem; }
    .scan-day-label { font-family: var(--font-tech); font-size: 0.55rem; color: var(--color-hud-primary-soft); opacity: 0.45; }

    /* Scan bar shimmer */
    @keyframes bar-rise { from { height: 0; } to { /* height set by inline style */ } }
    .scan-bar.shimmer { animation: bar-rise 0.3s ease both; }

    /* Metrics grid */
    .metrics-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; flex-shrink: 0;
    }
    .metric-item {
      background: rgba(0,191,255,0.05); border: 1px solid rgba(0,191,255,0.1);
      border-radius: 4px; padding: 0.5rem 0.6rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .metric-item:hover { border-color: rgba(0,191,255,0.25); box-shadow: 0 0 8px rgba(0,191,255,0.12); }
    .metric-label { font-family: var(--font-tech); font-size: 0.6rem; letter-spacing: 1px; color: var(--color-hud-primary-soft); opacity: 0.7; text-transform: uppercase; }
    .metric-value { font-family: var(--font-tech); font-size: 0.9rem; color: var(--color-hud-neutral); margin-top: 0.15rem; display: flex; align-items: center; }
    .metric-icon { opacity: 0.45; margin-right: 0.25rem; font-family: var(--font-tech); }
    .metric-val { /* inner span for value text, not overwritten by JS */ }

    /* Buttons */
    .unit-toggle {
      font-family: var(--font-tech); font-size: 0.7rem; cursor: pointer;
      color: var(--color-hud-primary-soft); letter-spacing: 1px;
      background: none; border: 1px solid rgba(0,191,255,0.2); padding: 0.1rem 0.4rem; border-radius: 2px;
    }
    .unit-toggle:hover { border-color: var(--color-hud-primary); color: var(--color-hud-neutral); }
    .settings-btn {
      font-size: 0.8rem; cursor: pointer; color: var(--color-hud-primary-soft);
      opacity: 0.45; background: none; border: none; padding: 0;
    }
    .settings-btn:hover { opacity: 1; color: var(--color-hud-neutral); }

    .flicker-on-mount { animation: flicker 0.3s steps(1) 3; }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0} }

    /* --- Icon glitch system --- */
    .hero-icon-wrap { display: flex; justify-content: center; margin-bottom: 0.5rem; }
    .icon-glitch-wrap { position: relative; width: 52px; height: 52px; color: var(--color-hud-primary); }
    .icon-glitch-wrap--sm { width: 20px; height: 20px; }
    .icon-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      filter: drop-shadow(0 0 6px var(--color-hud-primary));
    }
    .icon-layer svg { width: 100%; height: 100%; }
    .icon-layer.icon-neighbor { opacity: 0; }

    @keyframes glitch-out-subtle {
      0%   { clip-path: inset(0 0 0 0); opacity: 1; }
      20%  { clip-path: inset(20% 0 60% 0); opacity: 0.8; }
      40%  { clip-path: inset(60% 0 20% 0); opacity: 0.9; }
      60%  { clip-path: inset(40% 0 40% 0); opacity: 0.85; }
      80%  { clip-path: inset(0 0 80% 0); opacity: 0.9; }
      100% { clip-path: inset(0 0 100% 0); opacity: 0; }
    }
    @keyframes glitch-in-subtle {
      0%   { clip-path: inset(0 0 100% 0); opacity: 0; }
      20%  { clip-path: inset(80% 0 0 0); opacity: 0.9; }
      40%  { clip-path: inset(40% 0 40% 0); opacity: 0.85; }
      60%  { clip-path: inset(20% 0 60% 0); opacity: 0.9; }
      80%  { clip-path: inset(60% 0 20% 0); opacity: 0.8; }
      100% { clip-path: inset(0 0 0 0); opacity: 1; }
    }
    @keyframes glitch-out-normal {
      0%   { clip-path: inset(0 0 0 0); opacity: 1; }
      15%  { clip-path: inset(40% 0 50% 0); opacity: 0.7; transform: translateX(-2px); }
      35%  { clip-path: inset(10% 0 70% 0); opacity: 0.8; transform: translateX(2px); }
      55%  { clip-path: inset(60% 0 10% 0); opacity: 0.7; transform: translateX(-1px); }
      75%  { clip-path: inset(0 0 90% 0); opacity: 0.6; transform: translateX(0); }
      100% { clip-path: inset(0 0 100% 0); opacity: 0; transform: translateX(0); }
    }
    @keyframes glitch-in-normal {
      0%   { clip-path: inset(0 0 100% 0); opacity: 0; transform: translateX(0); }
      25%  { clip-path: inset(90% 0 0 0); opacity: 0.6; transform: translateX(2px); }
      45%  { clip-path: inset(10% 0 60% 0); opacity: 0.7; transform: translateX(-2px); }
      65%  { clip-path: inset(70% 0 10% 0); opacity: 0.8; transform: translateX(1px); }
      85%  { clip-path: inset(50% 0 40% 0); opacity: 0.9; transform: translateX(0); }
      100% { clip-path: inset(0 0 0 0); opacity: 1; transform: translateX(0); }
    }
    @keyframes glitch-out-wild {
      0%   { clip-path: inset(0 0 0 0); opacity: 1; transform: translate(0,0); }
      10%  { clip-path: inset(60% 0 20% 0); opacity: 0.5; transform: translate(-4px,1px); }
      25%  { clip-path: inset(10% 0 65% 0); opacity: 0.7; transform: translate(4px,-2px); }
      40%  { clip-path: inset(45% 0 35% 0); opacity: 0.4; transform: translate(-3px,2px); filter: hue-rotate(90deg); }
      55%  { clip-path: inset(75% 0 5% 0); opacity: 0.6; transform: translate(2px,0); filter: none; }
      70%  { clip-path: inset(5% 0 80% 0); opacity: 0.3; transform: translate(-2px,1px); }
      85%  { clip-path: inset(0 0 95% 0); opacity: 0.5; transform: translate(0,0); }
      100% { clip-path: inset(0 0 100% 0); opacity: 0; transform: translate(0,0); }
    }
    @keyframes glitch-in-wild {
      0%   { clip-path: inset(0 0 100% 0); opacity: 0; transform: translate(0,0); }
      15%  { clip-path: inset(95% 0 0 0); opacity: 0.5; transform: translate(3px,-1px); }
      30%  { clip-path: inset(5% 0 75% 0); opacity: 0.6; transform: translate(-4px,2px); }
      45%  { clip-path: inset(80% 0 5% 0); opacity: 0.4; transform: translate(2px,-2px); filter: hue-rotate(-90deg); }
      60%  { clip-path: inset(35% 0 45% 0); opacity: 0.7; transform: translate(-2px,0); filter: none; }
      75%  { clip-path: inset(65% 0 10% 0); opacity: 0.8; transform: translate(1px,1px); }
      90%  { clip-path: inset(20% 0 60% 0); opacity: 0.9; transform: translate(0,0); }
      100% { clip-path: inset(0 0 0 0); opacity: 1; transform: translate(0,0); }
    }

    .glitching .icon-current { animation: glitch-out-normal 0.4s ease forwards; }
    .glitching .icon-neighbor { opacity: 1; animation: glitch-in-normal 0.4s ease forwards; }
    .glitching.intensity-subtle .icon-current { animation: glitch-out-subtle 0.35s ease forwards; }
    .glitching.intensity-subtle .icon-neighbor { opacity: 1; animation: glitch-in-subtle 0.35s ease forwards; }
    .glitching.intensity-wild .icon-current { animation: glitch-out-wild 0.5s ease forwards; }
    .glitching.intensity-wild .icon-neighbor { opacity: 1; animation: glitch-in-wild 0.5s ease forwards; }
  </style>
</head>
<body>
  <div class="widget-container flicker-on-mount" id="main-container">
    <div class="background-layers"><div class="widget-background"></div></div>
    <div class="scanlines"></div>
    <div class="pattern-layer"></div>
    <div class="dot-matrix-pattern"></div>
    <div class="mouse-glow"></div>
    <div class="resizer resizer-rb" data-direction="SouthEast"></div>

    <div class="content">
      <header>
        <h1 data-open-settings>KOJI // WEATHER</h1>
        <div class="header-right">
          <button class="unit-toggle" id="unit-toggle">°C</button>
          <button class="settings-btn" data-open-settings>⚙</button>
        </div>
      </header>

      <div class="temp-display">
        <div class="hero-icon-wrap">
          <div class="icon-glitch-wrap" id="hero-icon">
            <div class="icon-layer icon-current" id="hero-icon-current"></div>
            <div class="icon-layer icon-neighbor" id="hero-icon-neighbor"></div>
          </div>
        </div>
        <div class="temp-value"><span id="temp-value">--</span><span class="temp-unit" id="temp-unit">°C</span></div>
        <div class="weather-condition" id="condition">LOADING...</div>
        <div class="location-display" id="location">--</div>
        <div class="feels-like" id="feels-like"></div>
        <div class="sunrise-sunset" id="sunrise-sunset" style="display:none;font-family:var(--font-tech);font-size:0.65rem;color:var(--color-hud-primary-soft);opacity:0.45;margin-top:0.15rem;letter-spacing:1px;"></div>
      </div>

      <div class="hourly-section">
        <div class="section-label">HOURLY FORECAST</div>
        <div class="hourly-grid" id="hourly-grid"></div>
      </div>

      <div class="scan-section">
        <div class="scan-header">
          <span class="section-label" style="margin-bottom:0">7-DAY SCAN</span>
          <div class="scan-tabs" id="scan-tabs">
            <button class="scan-tab active" data-mode="temp">TMP</button>
            <button class="scan-tab" data-mode="humidity">HUM</button>
            <button class="scan-tab" data-mode="precip">PCP</button>
            <button class="scan-tab" data-mode="wind">WND</button>
          </div>
        </div>
        <div class="scan-bars-container" id="scan-bars"></div>
        <div class="scan-day-labels" id="scan-day-labels"></div>
      </div>

      <div class="metrics-grid" id="metrics-grid"></div>
    </div>
  </div>
  <script src="logic.js"></script>
</body>
</html>
