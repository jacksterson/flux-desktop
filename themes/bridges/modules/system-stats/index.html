<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOJI PRO // SYS.STATS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-hud.css">
  <style>
    /* widget-container pattern */
    .widget-container {
      position: relative; width: 100%; height: 100%;
      padding: 0.8rem 1rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      touch-action: none;
      font-family: var(--font-main);
      color: var(--color-hud-neutral);
      overflow: hidden;
    }
    .background-layers {
      position: absolute; inset: -40px;
      -webkit-mask-image: radial-gradient(ellipse closest-side at center, black 20%, transparent 90%);
      mask-image: radial-gradient(ellipse closest-side at center, black 20%, transparent 90%);
      pointer-events: none; z-index: 0;
    }
    .widget-background {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse closest-side at center, rgba(10,15,26,0.55) 20%, transparent 90%);
      backdrop-filter: blur(25px);
    }
    .scanlines {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.08) 50%);
      background-size: 100% 4px;
      pointer-events: none; z-index: 1;
    }
    .resizer {
      position: absolute; bottom: 0; right: 0;
      width: 16px; height: 16px;
      cursor: se-resize; z-index: 50;
    }
    @keyframes section-enter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .content > *:nth-child(1) { animation: section-enter 0.4s ease both; }
    .content > *:nth-child(2) { animation: section-enter 0.4s 60ms ease both; }
    .content > *:nth-child(3) { animation: section-enter 0.4s 120ms ease both; }
    .content > *:nth-child(4) { animation: section-enter 0.4s 180ms ease both; }
    .content > *:nth-child(5) { animation: section-enter 0.4s 240ms ease both; }
    .content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; gap: 0.6rem;
      height: 100%;
    }

    header {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 1px solid rgba(0,191,255,0.18);
      box-shadow: 0 1px 0 rgba(0,191,255,0.06);
      padding-bottom: 0.4rem; flex-shrink: 0; position: relative;
    }
    header::before {
      content: ""; position: absolute; left: -1rem; top: 0; bottom: 0.4rem;
      width: 2px; background: var(--color-hud-primary);
      box-shadow: 0 0 6px var(--color-hud-primary); opacity: 0.8;
    }
    header h1 {
      font-family: var(--font-header); font-size: 0.8rem;
      letter-spacing: 2px; color: var(--color-hud-neutral);
      opacity: 0.7; text-transform: uppercase; cursor: pointer;
    }
    header h1:hover { opacity: 1; text-shadow: 0 0 10px var(--color-hud-primary); }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }
    .uptime-display {
      font-family: var(--font-tech); font-size: 1.2rem;
      color: var(--color-hud-primary-soft); opacity: 0.45;
    }
    .settings-btn {
      font-size: 0.8rem; cursor: pointer;
      color: var(--color-hud-primary-soft); opacity: 0.45;
      background: none; border: none; padding: 0;
    }
    .settings-btn:hover { opacity: 1; }

    .hero { text-align: center; padding: 0.3rem 0; flex-shrink: 0; }
    .hero-value {
      font-family: var(--font-header); font-weight: 900; font-size: 3.5rem;
      line-height: 1;
      color: var(--current-glow, var(--color-hud-primary));
      text-shadow: 0 0 30px var(--current-glow, var(--color-hud-primary));
      transition: color 0.5s, text-shadow 0.5s;
    }
    .hero-label {
      font-family: var(--font-main); font-size: 1.3rem; letter-spacing: 2px;
      color: var(--color-hud-primary-soft); opacity: 0.7;
      text-transform: uppercase; margin-top: 0.1rem;
    }
    .hero-sub {
      font-family: var(--font-tech); font-size: 1.2rem;
      color: var(--color-hud-primary-soft); opacity: 0.45; margin-top: 0.15rem;
    }

    .scan-bars { display: flex; flex-direction: column; gap: 0.45rem; flex-shrink: 0; }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; }
    .bar-key {
      font-family: var(--font-tech); font-size: 0.6rem;
      color: var(--color-hud-primary-soft); opacity: 0.7;
      width: 2.8rem; flex-shrink: 0; text-transform: uppercase;
    }
    .bar-track {
      flex: 1; height: 5px;
      background: rgba(0,191,255,0.1); border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: var(--fill, 0%); border-radius: 2px;
      background: var(--bar-color, var(--color-hud-primary));
      transition: width 0.4s cubic-bezier(0.2, 0, 0.4, 1), background 0.4s ease;
      box-shadow: 0 0 5px var(--bar-color, var(--color-hud-primary));
    }
    .bar-meta {
      font-family: var(--font-tech); font-size: 0.6rem;
      color: var(--color-hud-neutral); width: 6rem; text-align: right;
      flex-shrink: 0; opacity: 1.0;
    }

    /* Dot-matrix graph canvas */
    .dmg {
      width: 100%; height: 36px; display: block;
      border: 1px solid rgba(0,191,255,0.1);
      background: rgba(0,191,255,0.03);
      border-radius: 2px;
      margin-top: 0.2rem; margin-bottom: 0.1rem;
    }

    /* Dual graph wrapper */
    .dual-wrap {
      position: relative; width: 100%; height: 44px;
      border: 1px solid rgba(0,191,255,0.1);
      background: rgba(0,191,255,0.03);
      border-radius: 2px;
      margin-top: 0.2rem; overflow: hidden;
    }
    .dual-center {
      position: absolute; left: 0; right: 0; top: 50%; height: 1px;
      background: rgba(0,191,255,0.35);
      box-shadow: 0 0 4px rgba(0,191,255,0.4); z-index: 2;
    }
    .dual-up, .dual-down {
      position: absolute; left: 0; right: 0; height: 50%; overflow: hidden;
    }
    .dual-up   { top: 0; }
    .dual-down { bottom: 0; }
    .dual-up   canvas,
    .dual-down canvas { display: block; width: 100%; height: 100%; }

    /* Graph stat labels below graphs */
    .glabels {
      display: flex; justify-content: space-between; margin-top: 0.15rem; flex-shrink: 0;
    }
    .glbl { font-family: var(--font-tech); font-size: 0.55rem; opacity: 0.7; }

    /* Section divider */
    .sec-div {
      height: 1px; background: rgba(0,191,255,0.1);
      margin: 0.1rem 0; flex-shrink: 0;
    }

    /* Section title row */
    .sec-t {
      font-family: var(--font-tech); font-size: 0.56rem; opacity: 0.45;
      letter-spacing: 2px; text-transform: uppercase;
      display: flex; justify-content: space-between; margin-bottom: 0.25rem;
      flex-shrink: 0;
    }
    .sec-t span { color: var(--color-hud-primary); opacity: 0.7; font-size: 0.54rem; letter-spacing: 0; }

    /* MEM bar gradient overrides (width still controlled by --fill) */
    .bar-fill.mem-used {
      background: linear-gradient(to right, #e60012, #FF6B1A, #FFD700);
      box-shadow: 0 0 5px #FF6B1A;
    }
    .bar-fill.mem-avail {
      background: linear-gradient(to right, #005596, #00BFFF);
      box-shadow: 0 0 5px #00BFFF;
    }

    .flicker-on-mount { animation: flicker 0.3s steps(1) 3; }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div class="widget-container flicker-on-mount" id="main-container">
    <div class="background-layers"><div class="widget-background"></div></div>
    <div class="scanlines"></div>
    <div class="pattern-layer"></div>
    <div class="dot-matrix-pattern"></div>
    <div class="mouse-glow"></div>
    <div class="resizer resizer-rb" data-direction="SouthEast"></div>

    <div class="content">
      <header>
        <h1 id="open-settings" data-open-settings>KOJI // SYS.STATS</h1>
        <div class="header-right">
          <div class="uptime-display">UP: <span id="uptime">00:00:00</span></div>
          <button class="settings-btn" data-open-settings>⚙</button>
        </div>
      </header>

      <!-- CPU SECTION -->
      <div class="hero">
        <div class="hero-value" id="cpu-usage">--%</div>
        <div class="hero-label">CPU LOAD</div>
        <div class="hero-sub"><span id="cpu-freq">-- GHz</span> &nbsp;|&nbsp; <span id="cpu-temp">--°C</span></div>
      </div>
      <div class="scan-bars">
        <div class="bar-row">
          <div class="bar-key">CPU</div>
          <div class="bar-track"><div class="bar-fill" id="cpu-bar-fill"></div></div>
          <div class="bar-meta" id="cpu-bar-meta">--%</div>
        </div>
      </div>
      <canvas class="dmg" id="g-cpu"></canvas>

      <!-- GPU SECTION -->
      <div class="sec-div"></div>
      <div class="sec-t">GPU <span id="gpu-temp-label">--°C</span></div>
      <div class="scan-bars">
        <div class="bar-row">
          <div class="bar-key">VRAM</div>
          <div class="bar-track"><div class="bar-fill" id="gpu-bar-fill"></div></div>
          <div class="bar-meta" id="gpu-vram-pct">--%</div>
        </div>
      </div>
      <canvas class="dmg" id="g-gpu"></canvas>

      <!-- MEM SECTION -->
      <div class="sec-div"></div>
      <div class="sec-t">MEM <span id="mem-total-label">-- GiB</span></div>
      <div class="scan-bars">
        <div class="bar-row">
          <div class="bar-key">USED</div>
          <div class="bar-track"><div class="bar-fill mem-used" id="mem-used-fill"></div></div>
          <div class="bar-meta" id="mem-used-val">-- GiB</div>
        </div>
        <div class="bar-row">
          <div class="bar-key">AVAIL</div>
          <div class="bar-track"><div class="bar-fill mem-avail" id="mem-avail-fill"></div></div>
          <div class="bar-meta" id="mem-avail-val">-- GiB</div>
        </div>
      </div>
      <div class="dual-wrap">
        <div class="dual-center"></div>
        <div class="dual-up"><canvas id="g-mem-a"></canvas></div>
        <div class="dual-down"><canvas id="g-mem-b"></canvas></div>
      </div>
      <div class="glabels">
        <div class="glbl" style="color:var(--color-hud-caution)">▲ USED</div>
        <div class="glbl" style="color:var(--color-hud-primary)">AVAIL ▼</div>
      </div>

      <!-- NET SECTION -->
      <div class="sec-div"></div>
      <div class="sec-t">NET</div>
      <div class="dual-wrap">
        <div class="dual-center"></div>
        <div class="dual-up"><canvas id="g-net-a"></canvas></div>
        <div class="dual-down"><canvas id="g-net-b"></canvas></div>
      </div>
      <div class="glabels">
        <div class="glbl" style="color:var(--color-hud-primary)">▲ IN &nbsp;<span id="net-in-val">-- B/s</span></div>
        <div class="glbl" style="color:var(--color-hud-alert)">OUT <span id="net-out-val">-- B/s</span> ▼</div>
      </div>

      <!-- DISK SECTION -->
      <div class="sec-div"></div>
      <div class="sec-t">DISK</div>
      <div class="scan-bars">
        <div class="bar-row">
          <div class="bar-key">READ</div>
          <div class="bar-track"><div class="bar-fill" id="disk-read-fill"></div></div>
          <div class="bar-meta" id="disk-read-val">-- B/s</div>
        </div>
        <div class="bar-row">
          <div class="bar-key">WRITE</div>
          <div class="bar-track"><div class="bar-fill" id="disk-write-fill"></div></div>
          <div class="bar-meta" id="disk-write-val">-- B/s</div>
        </div>
      </div>
      <div class="dual-wrap">
        <div class="dual-center"></div>
        <div class="dual-up"><canvas id="g-disk-a"></canvas></div>
        <div class="dual-down"><canvas id="g-disk-b"></canvas></div>
      </div>
      <div class="glabels">
        <div class="glbl" style="color:var(--color-hud-primary)">▲ READ</div>
        <div class="glbl" style="color:var(--color-hud-alert)">WRITE ▼</div>
      </div>
    </div>
  </div>
  <script src="logic.js"></script>
</body>
</html>
